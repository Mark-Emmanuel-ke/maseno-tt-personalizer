name: Deploy to GitHub Pages

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:  # Allow manual trigger from GitHub

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create config.js from secrets
        run: |
          cat > config.js << EOF
          window.APP_CONFIG = {
              adminPasscodeHash: "${{ secrets.ADMIN_PASSCODE_HASH }}",
              github: {
                  username: "${{ secrets.USERNAME }}",
                  repo: "${{ secrets.REPO_NAME }}",
                  token: "${{ secrets.ENCRYPTED_TOKEN }}"
              }
          };
          EOF
          echo "=== config.js created ==="
          cat config.js

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Cleanup config.js after deploy
        if: always()
        run: rm -f config.js
