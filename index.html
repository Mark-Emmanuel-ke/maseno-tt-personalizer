<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="website icon" href="./icon.jpg">
    <link rel="stylesheet" href="./index.css">
    <title>My TimeTable</title>
</head>
<body>
    <h1>Personalized Timetable</h1>
    <div class="contents">
        <div class="details">
            <h3>Enter Units</h3>
            <input type="text" id="code" placeholder="Unit Code...(Required)" required>
            <input type="text" id="name" placeholder="Unit name...(Optional)">
            <button id="add">Add Unit</button>
            <h3>Selected Units</h3>
            <div class="units">

            </div>
            <label for="file">Source TimeTable</label><br/>
            <div class="fileGen">
                <input id="file" type="file" name="file">
                <button class="generate action-btn">Generate TT</button>
            </div>
            <small class="source-note">If no file is selected, a default admin timetable will be used (if uploaded).</small>
        </div>
        <div class="separator"></div>
        <div class="outputWrap">
            <div class="outputActions"></div>
            <div class="output"></div>
        </div>
    </div>

    <section id="adminPanel" class="admin-panel hidden" aria-hidden="true">
        <h3>Visitor Logs</h3>
        <p class="admin-hint">Hidden mode active. Press Esc to close.</p>
        <div class="admin-stats"></div>
        <div class="admin-controls"></div>
        <div class="admin-logs"></div>
    </section>

    <footer class="app-footer">
        <div class="footer-content">
            <p><strong>Developer:</strong> Mark Emmanuel</p>
            <div class="footer-socials">
                <a href="https://linkedin.com/in/mark-emmanuel" target="_blank" title="LinkedIn" class="social-link">
                    <span class="social-icon">in</span>
                </a>
                <a href="https://github.com" target="_blank" title="GitHub" class="social-link">
                    <span class="social-icon">⚙</span>
                </a>
                <a href="https://facebook.com" target="_blank" title="Facebook" class="social-link">
                    <span class="social-icon">f</span>
                </a>
                <a href="tel:+254769600012" title="Call" class="social-link">
                    <span class="social-icon">☎</span>
                </a>
                <a href="https://wa.me/254769600012" target="_blank" title="WhatsApp" class="social-link">
                    <span class="social-icon">W</span>
                </a>
            </div>
            <p class="footer-credit">© 2026 Maseno University Timetable Personalizer</p>
        </div>
        <button id="adminMobileBtn" class="admin-mobile-btn" title="Admin Login">⚙</button>
    </footer>

    <script src="./config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="./script.js"></script>
</body>
</html>
